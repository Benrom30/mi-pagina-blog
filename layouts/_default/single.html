{{ define "main" }}
<article>
  <header class="mb-4">
    <h1>{{ .Title }}</h1>
    <p class="text-muted">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 de January, 2006" }}</time>
    </p>
  </header>
  <div class="article-content">
    {{ .Content }}
  </div>
  <p class="mt-5">
    <a href="{{ .Parent.RelPermalink }}">&larr; Volver a {{ .Parent.Title }}</a>
  </p>
</article>
{{ end }}
