{{ define "main" }}
<h1>{{ .Title }}</h1>
<div class="section-intro mb-4">
  {{ .Content }}
</div>
{{ if .Pages }}
<ul class="list-unstyled">
  {{ range .Pages }}
<li class="mb-3">
<h2 class="h4 mb-0">
<a href="{{ .RelPermalink }}">{{ .Title }}</a>
</h2>
</li>
  {{ end }}
</ul>
{{ else if or (eq .Section "diario") (eq .Section "tutoriales") }}
<p class="alert alert-info" role="status">
  Todavía no hay contenido publicado en esta sección. ¡Pronto vas a encontrar algo acá!
</p>
{{ end }}
{{ end }}
